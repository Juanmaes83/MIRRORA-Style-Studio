name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  syntax-and-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Módulos ES sintácticamente válidos
        run: |
          for f in js/app.js js/store.js js/data/catalog.js js/data/brand.js js/avatar.js js/analytics.js js/qr-handoff.js js/console.js; do
            echo "check $f" && node --check "$f"
          done
      - name: El catálogo consumido es coherente (schema, refs, solo publicables)
        run: |
          node -e '
            const fs=require("fs");
            if(!fs.existsSync("catalog/catalog.json")){console.log("sin catalogo externo (fallback SVG) — ok");process.exit(0)}
            const c=JSON.parse(fs.readFileSync("catalog/catalog.json","utf8"));
            const ids=new Set(c.products.map(p=>p.id));
            for(const o of c.outfits){
              if(!["approved","published"].includes(o.status)) throw new Error(o.id+" no publicable en catalogo");
              for(const g of o.garmentIds) if(!ids.has(g)) throw new Error(o.id+" ref rota "+g);
              if(o.image && !fs.existsSync("catalog/"+o.image)) throw new Error(o.id+" imagen ausente");
            }
            for(const p of c.products) if(!fs.existsSync("catalog/"+p.image)) throw new Error(p.id+" imagen ausente");
            console.log("catalogo ok:",c.products.length,"productos",c.outfits.length,"outfits");
          '
